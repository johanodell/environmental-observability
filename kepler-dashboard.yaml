---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kepler-power-monitoring
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "kepler"
  json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 100,
          "panels": [],
          "title": "Overview - Real-time Power Consumption",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 1000 }
                ]
              },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(irate(kepler_pod_cpu_joules_total[1m]))",
              "legendFormat": "Cluster Total",
              "refId": "A"
            }
          ],
          "title": "Cluster Power (Watts)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              },
              "unit": "kwatth"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(increase(kepler_pod_cpu_joules_total[24h])) / 3600000",
              "legendFormat": "24h Total",
              "refId": "A"
            }
          ],
          "title": "Cluster Energy (kWh/24h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "red", "value": 20 }
                ]
              },
              "unit": "none",
              "unitScale": true,
              "custom": { "postfix": " SEK" }
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum(increase(kepler_pod_cpu_joules_total[24h])) / 3600000) * ${electricity_price}",
              "legendFormat": "24h Cost",
              "refId": "A"
            }
          ],
          "title": "Cluster Cost (24h)",
          "type": "stat"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 1,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1000 },
                  { "color": "red", "value": 5000 }
                ]
              },
              "unit": "massg"
            },
            "overrides": []
          },
          "gridPos": { "h": 6, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "textMode": "auto"
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum(increase(kepler_pod_cpu_joules_total[24h])) / 3600000) * ${carbon_intensity}",
              "legendFormat": "CO2eq (24h)",
              "refId": "A"
            }
          ],
          "title": "CO2eq Emissions (24h) @ ${carbon_intensity} gCO2eq/kWh",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 7 },
          "id": 101,
          "panels": [],
          "title": "Node Level Power Consumption",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Power (Watts)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "id": 5,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (node_name) (irate(kepler_pod_cpu_joules_total{node_name=~\"$node\"}[1m]))",
              "legendFormat": "{{node_name}}",
              "refId": "A"
            }
          ],
          "title": "Power by Node (Watts)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "hideFrom": { "legend": false, "tooltip": false, "viz": false }
              },
              "mappings": [],
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "id": 6,
          "options": {
            "legend": { "displayMode": "table", "placement": "right", "showLegend": true, "values": ["value", "percent"] },
            "pieType": "donut",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "tooltip": { "mode": "single", "sort": "none" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (node_name) (irate(kepler_pod_cpu_joules_total{node_name=~\"$node\"}[1m]))",
              "legendFormat": "{{node_name}}",
              "refId": "A"
            }
          ],
          "title": "Power Distribution by Node",
          "type": "piechart"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 16 },
          "id": 102,
          "panels": [],
          "title": "Namespace Level Power & Cost",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Power (Watts)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 20,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 17 },
          "id": 7,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod_namespace) (irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[1m]))",
              "legendFormat": "{{pod_namespace}}",
              "refId": "A"
            }
          ],
          "title": "Power by Namespace (Watts) - Stacked",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "decimals": 2,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Namespace" }, "properties": [{ "id": "custom.width", "value": 200 }] },
              { "matcher": { "id": "byName", "options": "Power (W)" }, "properties": [{ "id": "unit", "value": "watt" }, { "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "gauge" } }] },
              { "matcher": { "id": "byName", "options": "Energy (kWh/24h)" }, "properties": [{ "id": "unit", "value": "kwatth" }] },
              { "matcher": { "id": "byName", "options": "Cost (SEK/24h)" }, "properties": [{ "id": "unit", "value": "none" }, { "id": "custom.displayMode", "value": "basic" }] },
              { "matcher": { "id": "byName", "options": "CO2eq (g/24h)" }, "properties": [{ "id": "unit", "value": "massg" }] }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 17 },
          "id": 8,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": true },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Power (W)" }]
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod_namespace) (irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[1m]))",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Power"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[24h])) / 3600000",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Energy"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum by (pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[24h])) / 3600000) * ${electricity_price}",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Cost"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum by (pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[24h])) / 3600000) * ${carbon_intensity}",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "CO2"
            }
          ],
          "title": "Namespace Power, Cost & CO2eq Table",
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "pod_namespace" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "Time 3": true, "Time 4": true }, "indexByName": {}, "renameByName": { "Value #CO2": "CO2eq (g/24h)", "Value #Cost": "Cost (SEK/24h)", "Value #Energy": "Energy (kWh/24h)", "Value #Power": "Power (W)", "pod_namespace": "Namespace" } } }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 25 },
          "id": 103,
          "panels": [],
          "title": "Pod Level Analysis",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Power (Watts)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 1,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "watt"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 26 },
          "id": 9,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "right", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "topk(15, sum by (pod_name, pod_namespace) (irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\"}[1m])))",
              "legendFormat": "{{pod_namespace}}/{{pod_name}}",
              "refId": "A"
            }
          ],
          "title": "Top 15 Pods by Power (Watts)",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": {
                "align": "auto",
                "cellOptions": { "type": "auto" },
                "inspect": false
              },
              "decimals": 3,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 10 },
                  { "color": "red", "value": 50 }
                ]
              }
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "Namespace" }, "properties": [{ "id": "custom.width", "value": 180 }] },
              { "matcher": { "id": "byName", "options": "Pod" }, "properties": [{ "id": "custom.width", "value": 280 }] },
              { "matcher": { "id": "byName", "options": "Power (W)" }, "properties": [{ "id": "unit", "value": "watt" }, { "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "gauge" } }] },
              { "matcher": { "id": "byName", "options": "Energy (kWh/24h)" }, "properties": [{ "id": "unit", "value": "kwatth" }] },
              { "matcher": { "id": "byName", "options": "Cost (SEK/24h)" }, "properties": [{ "id": "unit", "value": "none" }, { "id": "custom.displayMode", "value": "basic" }] },
              { "matcher": { "id": "byName", "options": "CO2eq (g/24h)" }, "properties": [{ "id": "unit", "value": "massg" }] }
            ]
          },
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 34 },
          "id": 10,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": true },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Power (W)" }]
          },
          "pluginVersion": "9.5.0",
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod_name, pod_namespace) (irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\"}[1m]))",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Power"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum by (pod_name, pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\"}[24h])) / 3600000",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Energy"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum by (pod_name, pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\"}[24h])) / 3600000) * ${electricity_price}",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Cost"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "(sum by (pod_name, pod_namespace) (increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\"}[24h])) / 3600000) * ${carbon_intensity}",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "CO2"
            }
          ],
          "title": "Pod Power, Cost & CO2eq Details",
          "transformations": [
            { "id": "seriesToColumns", "options": { "byField": "pod_name" } },
            { "id": "organize", "options": { "excludeByName": { "Time": true, "Time 1": true, "Time 2": true, "Time 3": true, "Time 4": true, "pod_namespace 1": true, "pod_namespace 2": true, "pod_namespace 3": true }, "indexByName": {}, "renameByName": { "Value #CO2": "CO2eq (g/24h)", "Value #Cost": "Cost (SEK/24h)", "Value #Energy": "Energy (kWh/24h)", "Value #Power": "Power (W)", "pod_namespace": "Namespace", "pod_name": "Pod" } } }
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 44 },
          "id": 104,
          "panels": [],
          "title": "Power Component Breakdown (Package vs DRAM)",
          "type": "row"
        },
        {
          "datasource": { "type": "prometheus", "uid": "${datasource}" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "Power (Watts)",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 30,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "never",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "normal" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "watt"
            },
            "overrides": [
              { "matcher": { "id": "byName", "options": "CPU (Package)" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
              { "matcher": { "id": "byName", "options": "DRAM (Memory)" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] }
            ]
          },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 45 },
          "id": 11,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\", zone=\"package\"}[1m]))",
              "legendFormat": "CPU (Package)",
              "refId": "A"
            },
            {
              "datasource": { "type": "prometheus", "uid": "${datasource}" },
              "expr": "sum(irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\", pod_name=~\"$pod\", zone=\"dram\"}[1m]))",
              "legendFormat": "DRAM (Memory)",
              "refId": "B"
            }
          ],
          "title": "Power by Component (Stacked)",
          "type": "timeseries"
