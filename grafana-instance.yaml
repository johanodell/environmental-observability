---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: kepler-grafana
  namespace: grafana
  labels:
    dashboards: "kepler"
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "false"
    security:
      admin_user: admin
      admin_password: "<YOUR_GRAFANA_ADMIN_PASSWORD>"
  route:
    spec:
      tls:
        termination: edge
