---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: dynamic-energy-dashboard
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "kepler"
  json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 100,
          "panels": [],
          "title": "Live Data Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "orange", "value": 2},
                  {"color": "red", "value": 3}
                ]
              },
              "unit": "currencySEK"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 1},
          "id": 1,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
              "query": "from(bucket: \"energy-data\")\n  |> range(start: -1h)\n  |> filter(fn: (r) => r._measurement == \"electricity_price\")\n  |> filter(fn: (r) => r.type == \"current\")\n  |> filter(fn: (r) => r._field == \"total\")\n  |> last()",
              "refId": "A"
            }
          ],
          "title": "Current Electricity Price",
          "type": "stat"
        },
        {
          "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 50},
                  {"color": "orange", "value": 100},
                  {"color": "red", "value": 200}
                ]
              },
              "unit": "massg"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 1},
          "id": 2,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
              "query": "from(bucket: \"energy-data\")\n  |> range(start: -1h)\n  |> filter(fn: (r) => r._measurement == \"carbon_intensity\")\n  |> filter(fn: (r) => r._field == \"value\")\n  |> last()",
              "refId": "A"
            }
          ],
          "title": "Current Carbon Intensity (gCO2eq/kWh)",
          "type": "stat"
        },
        {
          "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 30},
                  {"color": "yellow", "value": 50},
                  {"color": "green", "value": 70}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 1},
          "id": 3,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
              "query": "from(bucket: \"energy-data\")\n  |> range(start: -1h)\n  |> filter(fn: (r) => r._measurement == \"carbon_intensity\")\n  |> filter(fn: (r) => r._field == \"renewable_pct\")\n  |> last()",
              "refId": "A"
            }
          ],
          "title": "Renewable Energy %",
          "type": "stat"
        },
        {
          "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 20},
                  {"color": "orange", "value": 40},
                  {"color": "red", "value": 60}
                ]
              },
              "unit": "percent"
            },
            "overrides": []
          },
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 1},
          "id": 4,
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "influxdb", "uid": "${DS_INFLUXDB}"},
              "query": "from(bucket: \"energy-data\")\n  |> range(start: -1h)\n  |> filter(fn: (r) => r._measurement == \"carbon_intensity\")\n  |> filter(fn: (r) => r._field == \"fossil_fuel_pct\")\n  |> last()",
              "refId": "A"
            }
          ],
          "title": "Fossil Fuel %",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 5},
          "id": 110,
          "panels": [],
          "title": "Top Consumers Overview",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 namespaces by energy consumption with estimated cost and CO2 emissions",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Namespace"},
                "properties": [{"id": "custom.width", "value": 200}]
              },
              {
                "matcher": {"id": "byName", "options": "Power (W)"},
                "properties": [
                  {"id": "unit", "value": "watt"},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-BlYlRd"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Energy (kWh)"},
                "properties": [
                  {"id": "unit", "value": "kwatth"},
                  {"id": "decimals", "value": 3}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Cost (SEK)"},
                "properties": [
                  {"id": "unit", "value": "currencySEK"},
                  {"id": "decimals", "value": 2},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-BlYlRd"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "CO2 (g)"},
                "properties": [
                  {"id": "unit", "value": "massg"},
                  {"id": "decimals", "value": 1},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-GrYlRd"}}
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 12, "x": 0, "y": 6},
          "id": 19,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": true},
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Power (W)"}]
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(irate(kepler_pod_cpu_joules_total[5m])) by (pod_namespace))",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Power"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(increase(kepler_pod_cpu_joules_total[1h])) by (pod_namespace) / 3600000)",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Energy"
            }
          ],
          "title": "Top 5 Namespace Consumers",
          "transformations": [
            {"id": "seriesToColumns", "options": {"byField": "pod_namespace"}},
            {"id": "organize", "options": {
              "excludeByName": {"Time": true, "Time 1": true, "Time 2": true},
              "indexByName": {},
              "renameByName": {"Value #Power": "Power (W)", "Value #Energy": "Energy (kWh)", "pod_namespace": "Namespace"}
            }},
            {"id": "calculateField", "options": {
              "alias": "Cost (SEK)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$electricity_price"},
              "mode": "binary"
            }},
            {"id": "calculateField", "options": {
              "alias": "CO2 (g)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$carbon_intensity"},
              "mode": "binary"
            }}
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 namespaces by carbon emissions",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "hideFrom": {"legend": false, "tooltip": false, "viz": false}
              },
              "mappings": [],
              "unit": "massg"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 6, "x": 12, "y": 6},
          "id": 20,
          "options": {
            "displayLabels": ["name", "percent"],
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "values": ["value"]},
            "pieType": "donut",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(increase(kepler_pod_cpu_joules_total[1h])) by (pod_namespace) / 3600000) * $carbon_intensity",
              "legendFormat": "{{pod_namespace}}",
              "refId": "A"
            }
          ],
          "title": "CO2 Emissions by Namespace (Top 5)",
          "type": "piechart"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 namespaces by energy cost",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "hideFrom": {"legend": false, "tooltip": false, "viz": false}
              },
              "mappings": [],
              "unit": "currencySEK"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 6, "x": 18, "y": 6},
          "id": 21,
          "options": {
            "displayLabels": ["name", "percent"],
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "values": ["value"]},
            "pieType": "donut",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(increase(kepler_pod_cpu_joules_total[1h])) by (pod_namespace) / 3600000) * $electricity_price",
              "legendFormat": "{{pod_namespace}}",
              "refId": "A"
            }
          ],
          "title": "Energy Cost by Namespace (Top 5)",
          "type": "piechart"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 16},
          "id": 111,
          "panels": [],
          "title": "Namespace Details: $namespace",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Detailed power consumption by pod in the selected namespace(s)",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "Pod"},
                "properties": [{"id": "custom.width", "value": 300}]
              },
              {
                "matcher": {"id": "byName", "options": "Namespace"},
                "properties": [{"id": "custom.width", "value": 150}]
              },
              {
                "matcher": {"id": "byName", "options": "Power (W)"},
                "properties": [
                  {"id": "unit", "value": "watt"},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-BlYlRd"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Energy (kWh)"},
                "properties": [
                  {"id": "unit", "value": "kwatth"},
                  {"id": "decimals", "value": 4}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Cost (SEK)"},
                "properties": [
                  {"id": "unit", "value": "currencySEK"},
                  {"id": "decimals", "value": 4}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "CO2 (g)"},
                "properties": [
                  {"id": "unit", "value": "massg"},
                  {"id": "decimals", "value": 2}
                ]
              }
            ]
          },
          "gridPos": {"h": 12, "w": 24, "x": 0, "y": 17},
          "id": 22,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": true},
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Power (W)"}]
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "sum(irate(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[5m])) by (pod_name, pod_namespace)",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Power"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "sum(increase(kepler_pod_cpu_joules_total{pod_namespace=~\"$namespace\"}[1h])) by (pod_name, pod_namespace) / 3600000",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Energy"
            }
          ],
          "title": "Pod Energy Consumption Details",
          "transformations": [
            {"id": "seriesToColumns", "options": {"byField": "pod_name"}},
            {"id": "organize", "options": {
              "excludeByName": {"Time": true, "Time 1": true, "Time 2": true, "pod_namespace 2": true},
              "indexByName": {},
              "renameByName": {"Value #Power": "Power (W)", "Value #Energy": "Energy (kWh)", "pod_name": "Pod", "pod_namespace 1": "Namespace"}
            }},
            {"id": "calculateField", "options": {
              "alias": "Cost (SEK)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$electricity_price"},
              "mode": "binary"
            }},
            {"id": "calculateField", "options": {
              "alias": "CO2 (g)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$carbon_intensity"},
              "mode": "binary"
            }}
          ],
          "type": "table"
        },
        {
          "collapsed": false,
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 29},
          "id": 112,
          "panels": [],
          "title": "Virtual Machine Consumers (OpenShift Virtualization)",
          "type": "row"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 Virtual Machines by energy consumption. VMs run as virt-launcher pods in OpenShift Virtualization.",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "thresholds"},
              "custom": {
                "align": "auto",
                "cellOptions": {"type": "auto"},
                "inspect": false
              },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "VM Name"},
                "properties": [{"id": "custom.width", "value": 250}]
              },
              {
                "matcher": {"id": "byName", "options": "Namespace"},
                "properties": [{"id": "custom.width", "value": 150}]
              },
              {
                "matcher": {"id": "byName", "options": "Power (W)"},
                "properties": [
                  {"id": "unit", "value": "watt"},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-BlYlRd"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Energy (kWh)"},
                "properties": [
                  {"id": "unit", "value": "kwatth"},
                  {"id": "decimals", "value": 3}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "Cost (SEK)"},
                "properties": [
                  {"id": "unit", "value": "currencySEK"},
                  {"id": "decimals", "value": 2},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-BlYlRd"}}
                ]
              },
              {
                "matcher": {"id": "byName", "options": "CO2 (g)"},
                "properties": [
                  {"id": "unit", "value": "massg"},
                  {"id": "decimals", "value": 1},
                  {"id": "custom.cellOptions", "value": {"mode": "gradient", "type": "gauge"}},
                  {"id": "color", "value": {"mode": "continuous-GrYlRd"}}
                ]
              }
            ]
          },
          "gridPos": {"h": 10, "w": 12, "x": 0, "y": 30},
          "id": 23,
          "options": {
            "cellHeight": "sm",
            "footer": {"countRows": false, "fields": "", "reducer": ["sum"], "show": true},
            "showHeader": true,
            "sortBy": [{"desc": true, "displayName": "Power (W)"}]
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(irate(kepler_pod_cpu_joules_total{pod_name=~\"virt-launcher-.*\"}[5m])) by (pod_name, pod_namespace))",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Power"
            },
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(increase(kepler_pod_cpu_joules_total{pod_name=~\"virt-launcher-.*\"}[1h])) by (pod_name, pod_namespace) / 3600000)",
              "format": "table",
              "instant": true,
              "legendFormat": "__auto",
              "refId": "Energy"
            }
          ],
          "title": "Top 5 VM Consumers",
          "transformations": [
            {"id": "seriesToColumns", "options": {"byField": "pod_name"}},
            {"id": "organize", "options": {
              "excludeByName": {"Time": true, "Time 1": true, "Time 2": true, "pod_namespace 2": true},
              "indexByName": {},
              "renameByName": {"Value #Power": "Power (W)", "Value #Energy": "Energy (kWh)", "pod_name": "VM Name", "pod_namespace 1": "Namespace"}
            }},
            {"id": "calculateField", "options": {
              "alias": "Cost (SEK)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$electricity_price"},
              "mode": "binary"
            }},
            {"id": "calculateField", "options": {
              "alias": "CO2 (g)",
              "binary": {"left": "Energy (kWh)", "operator": "*", "right": "$carbon_intensity"},
              "mode": "binary"
            }}
          ],
          "type": "table"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 VMs by carbon emissions",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "hideFrom": {"legend": false, "tooltip": false, "viz": false}
              },
              "mappings": [],
              "unit": "massg"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 6, "x": 12, "y": 30},
          "id": 24,
          "options": {
            "displayLabels": ["name", "percent"],
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "values": ["value"]},
            "pieType": "donut",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "tooltip": {"mode": "single", "sort": "none"}
          },
          "pluginVersion": "10.0.0",
          "targets": [
            {
              "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
              "expr": "topk(5, sum(increase(kepler_pod_cpu_joules_total{pod_name=~\"virt-launcher-.*\"}[1h])) by (pod_name) / 3600000) * $carbon_intensity",
              "legendFormat": "{{pod_name}}",
              "refId": "A"
            }
          ],
          "title": "VM CO2 Emissions (Top 5)",
          "type": "piechart"
        },
        {
          "datasource": {"type": "prometheus", "uid": "${DS_PROMETHEUS}"},
          "description": "Top 5 VMs by energy cost",
          "fieldConfig": {
            "defaults": {
              "color": {"mode": "palette-classic"},
              "custom": {
                "hideFrom": {"legend": false, "tooltip": false, "viz": false}
              },
              "mappings": [],
              "unit": "currencySEK"
            },
            "overrides": []
          },
          "gridPos": {"h": 10, "w": 6, "x": 18, "y": 30},
          "id": 25,
          "options": {
